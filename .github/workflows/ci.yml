name: CI

on:
  pull_request:
    paths:
      - "**.go"
      - "go.mod"
      - "go.sum"
      - "frontend/**"

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - run: go test ./engine/ -count=1

  test-race:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - run: go test -race ./engine/ -count=1

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - run: mkdir -p frontend/dist && touch frontend/dist/index.html
      - uses: actions/cache@v6
        with:
          path: /var/cache/apt/archives
          key: apt-gtk-webkit-${{ runner.os }}-${{ runner.arch }}
          restore-keys: apt-gtk-webkit-
      - run: sudo apt-get update && sudo apt-get install -y libgtk-4-dev libwebkitgtk-6.0-dev
      - uses: golangci/golangci-lint-action@v9
        with:
          version: latest

  vet:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - run: gofmt -l . | grep -q . && echo "gofmt required on files:" && gofmt -l . && exit 1 || exit 0
      - run: mkdir -p frontend/dist && touch frontend/dist/index.html
      - uses: actions/cache@v6
        with:
          path: /var/cache/apt/archives
          key: apt-gtk-webkit-${{ runner.os }}-${{ runner.arch }}
          restore-keys: apt-gtk-webkit-
      - run: sudo apt-get update && sudo apt-get install -y libgtk-4-dev libwebkitgtk-6.0-dev
      - run: go vet ./...

  tidy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - run: mkdir -p frontend/dist && touch frontend/dist/index.html
      - run: go mod tidy && git diff --exit-code go.mod go.sum

  ui-integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - run: mkdir -p frontend/dist && touch frontend/dist/index.html
      - uses: actions/cache@v6
        with:
          path: /var/cache/apt/archives
          key: apt-gtk-webkit-${{ runner.os }}-${{ runner.arch }}
          restore-keys: apt-gtk-webkit-
      - run: sudo apt-get update && sudo apt-get install -y libgtk-4-dev libwebkitgtk-6.0-dev
      - run: go test -v -run "TestUI" -count=1 .
